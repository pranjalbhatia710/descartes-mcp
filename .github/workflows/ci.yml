name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check descartes/ tests/ benchmark/

      - name: Tests (pytest)
        run: pytest -q

      - name: Console script starts + self-test (no keys -> deterministic fallback)
        run: |
          descartes --version
          descartes --selftest

      - name: Convergence benchmark (asserts invariants)
        run: python -m benchmark.bench

      - name: Coverage benchmark (assumptions examined vs left unexamined)
        run: python -m benchmark.coverage
